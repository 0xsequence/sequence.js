name: Publish Dists for Packages

on:
  workflow_dispatch:
  push:
    branches:
      - publish-dists

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/install-dependencies

      - name: Build package
        run: pnpm run build

      - name: Prepare dist branch
        run: |
          PACKAGES=("core" "primitives" "wdk")

          for PACKAGE in "${PACKAGES[@]}"; do
            BRANCH="dists/wallet-$PACKAGE"
            PKG_DIR="packages/wallet/$PACKAGE"

            echo "📦 Publishing $PACKAGE to $BRANCH"

            mkdir -p /tmp/$PACKAGE
            shopt -s dotglob
            cp -r $PKG_DIR/* /tmp/$PACKAGE || true

            cd /tmp/$PACKAGE
            git init
            git checkout -b $BRANCH

            git config user.name "github-actions"
            git config user.email "actions@github.com"

            git add .
            git commit -m "Build: publish @0xsequence/wallet-$PACKAGE dist"

            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push -f origin HEAD:$BRANCH

            cd -
          done
